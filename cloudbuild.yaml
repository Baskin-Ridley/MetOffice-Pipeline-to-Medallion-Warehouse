steps:
  - name: 'hashicorp/terraform:1.5.7'
    id: 'terraform-init'
    dir: 'terraform'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        terraform init

  - name: 'hashicorp/terraform:1.5.7'
    id: 'terraform-apply'
    dir: 'terraform'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        terraform apply -auto-approve \
          -var="project_id=${PROJECT_ID}" \
          -var="project_number=${PROJECT_NUMBER}" \
          -var="region=${_REGION}" \
          -var="environment=gcp"

  - name: 'hashicorp/terraform:1.5.7'
    id: 'terraform-output'
    dir: 'terraform'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        terraform output -raw composer_environment_name > /workspace/composer_environment_name
        terraform output -raw data_lake_bucket_name > /workspace/data_lake_bucket_name

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    id: 'deploy-to-composer'
    entrypoint: 'bash'
    env:
      - '_REGION=${_REGION}'
      - 'PROJECT_ID=${PROJECT_ID}'
    args:
      - '-c'
      - |
        set -e
        gcloud config set project ${PROJECT_ID}

        COMPOSER_ENV=$(cat /workspace/composer_environment_name)
        DATA_LAKE_BUCKET=$(cat /workspace/data_lake_bucket_name)
        
        COMPOSER_BUCKET=$(gcloud composer environments describe "$$COMPOSER_ENV" --location "${_REGION}" --format="value(config.gcsBucket)")

        echo "Uploading DAGs to gs://$$COMPOSER_BUCKET/dags/"
        gsutil -m cp -r dags/* gs://$$COMPOSER_BUCKET/dags/

        echo "Uploading scripts to gs://$$DATA_LAKE_BUCKET/scripts/"
        gsutil -m cp -r scripts gs://$$DATA_LAKE_BUCKET/scripts/
        gsutil -m cp -r common gs://$$DATA_LAKE_BUCKET/common/

        echo "Importing Airflow variables into Composer"
        export DATA_LAKE_BUCKET 
        
        python - <<'PY'
        import json, os
        variables = {
          "project_id": os.environ["PROJECT_ID"],
          "region": os.environ["_REGION"],
          "data_lake_root_path": f"gs://{os.environ['DATA_LAKE_BUCKET']}"
        }
        with open('/workspace/airflow_variables.json', 'w') as f:
            json.dump(variables, f, indent=2)
        PY
        
        gcloud composer environments run "$$COMPOSER_ENV" --location "${_REGION}" variables import -- /workspace/airflow_variables.json

timeout: '18000s'
options:
  logging: CLOUD_LOGGING_ONLY

# SET DEFAULT GLOBAL SUBSTITUTIONS HERE
substitutions:
  _REGION: 'europe-west2' # Defaults the pipeline to London