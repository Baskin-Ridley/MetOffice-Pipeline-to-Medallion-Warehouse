steps:
  - name: 'hashicorp/terraform:1.5.7'
    id: 'terraform-init'
    dir: 'terraform'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        terraform init

  - name: 'hashicorp/terraform:1.5.7'
    id: 'terraform-import'
    dir: 'terraform'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        terraform init
        terraform import -input=false -var="project_id=${PROJECT_ID}" -var="project_number=${PROJECT_NUMBER}" -var="region=${_REGION}" -var="environment=gcp" 'google_storage_bucket.datalake[0]' ${PROJECT_ID}-met-office-datalake || true
        terraform import -input=false -var="project_id=${PROJECT_ID}" -var="project_number=${PROJECT_NUMBER}" -var="region=${_REGION}" -var="environment=gcp" 'google_bigquery_dataset.warehouse[0]' ${PROJECT_ID}/noaa_medallion_warehouse || true
        terraform import -input=false -var="project_id=${PROJECT_ID}" -var="project_number=${PROJECT_NUMBER}" -var="region=${_REGION}" -var="environment=gcp" 'google_composer_environment.composer[0]' projects/${PROJECT_ID}/locations/${_REGION}/environments/${PROJECT_ID}-composer || true
        terraform import -input=false -var="project_id=${PROJECT_ID}" -var="project_number=${PROJECT_NUMBER}" -var="region=${_REGION}" -var="environment=gcp" 'google_service_account.composer_scheduler[0]' projects/${PROJECT_ID}/serviceAccounts/composer-scheduler@${PROJECT_ID}.iam.gserviceaccount.com || true
        terraform import -input=false -var="project_id=${PROJECT_ID}" -var="project_number=${PROJECT_NUMBER}" -var="region=${_REGION}" -var="environment=gcp" 'google_cloud_run_v2_job.composer_pause[0]' projects/${PROJECT_ID}/locations/${_REGION}/jobs/composer-pause || true
        terraform import -input=false -var="project_id=${PROJECT_ID}" -var="project_number=${PROJECT_NUMBER}" -var="region=${_REGION}" -var="environment=gcp" 'google_cloud_run_v2_job.composer_resume[0]' projects/${PROJECT_ID}/locations/${_REGION}/jobs/composer-resume || true
        terraform import -input=false -var="project_id=${PROJECT_ID}" -var="project_number=${PROJECT_NUMBER}" -var="region=${_REGION}" -var="environment=gcp" 'google_cloud_scheduler_job.composer_pause[0]' projects/${PROJECT_ID}/locations/${_REGION}/jobs/composer-daily-pause || true
        terraform import -input=false -var="project_id=${PROJECT_ID}" -var="project_number=${PROJECT_NUMBER}" -var="region=${_REGION}" -var="environment=gcp" 'google_cloud_scheduler_job.composer_resume[0]' projects/${PROJECT_ID}/locations/${_REGION}/jobs/composer-daily-resume || true

  - name: 'hashicorp/terraform:1.5.7'
    id: 'terraform-apply'
    dir: 'terraform'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        terraform apply -auto-approve \
          -var="project_id=${PROJECT_ID}" \
          -var="project_number=${PROJECT_NUMBER}" \
          -var="region=${_REGION}" \
          -var="environment=gcp"

  - name: 'hashicorp/terraform:1.5.7'
    id: 'terraform-output'
    dir: 'terraform'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        terraform output -raw composer_environment_name > /workspace/composer_environment_name
        terraform output -raw data_lake_bucket_name > /workspace/data_lake_bucket_name

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    id: 'deploy-to-composer'
    entrypoint: 'bash'
    env:
      - '_REGION=${_REGION}'
      - 'PROJECT_ID=${PROJECT_ID}'
    args:
      - '-c'
      - |
        set -e
        gcloud config set project ${PROJECT_ID}

        COMPOSER_ENV=$(cat /workspace/composer_environment_name)
        DATA_LAKE_BUCKET=$(cat /workspace/data_lake_bucket_name)
        
        COMPOSER_DAG_PATH=$(gcloud composer environments describe "$$COMPOSER_ENV" --location "${_REGION}" --format="value(config.dagGcsPrefix)")

        echo "Uploading DAGs to $$COMPOSER_DAG_PATH/"
        gsutil -m cp -r dags/* "$$COMPOSER_DAG_PATH/"

        echo "Uploading scripts and common to Composer DAGs directory..."
        gsutil -m cp -r scripts common "$$COMPOSER_DAG_PATH/"

        echo "Uploading seeds to data lake..."
        gsutil -m cp -r seeds gs://$$DATA_LAKE_BUCKET/

        echo "Importing Airflow variables into Composer"
        export DATA_LAKE_BUCKET 
        
        python3 - <<'PY'
        import json, os
        variables = {
          "project_id": os.environ["PROJECT_ID"],
          "region": os.environ["_REGION"],
          "data_lake_root_path": f"gs://{os.environ['DATA_LAKE_BUCKET']}"
        }
        with open('/workspace/airflow_variables.json', 'w') as f:
            json.dump(variables, f, indent=2)
        PY
        
        COMPOSER_BUCKET=$(echo "$$COMPOSER_DAG_PATH" | sed 's/\/dags//')
        gsutil cp /workspace/airflow_variables.json "$$COMPOSER_BUCKET/data/airflow_variables.json"

        gcloud composer environments run "$$COMPOSER_ENV" --location "${_REGION}" variables -- import /home/airflow/gcs/data/airflow_variables.json

timeout: '600s'
options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _REGION: 'europe-west2'